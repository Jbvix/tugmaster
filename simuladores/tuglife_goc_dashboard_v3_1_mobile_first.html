<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOC Dashboard v3.3 - TugLife FM</title>
  <meta name="description" content="GOC Dashboard - Operações de Rádio e Monitoramento - TugLife FM" />
  <!--
    ============================================================
    TugLife FM - GOC Dashboard (Painel Operacional)
    Versão: v3.3
    Data/Hora: 19/10/2025 19:01 (gerado automaticamente)
    Autor: Jossian Brito (Charlie Bravo)
    Revisor: Bravo Zulu (Assistente)
    ============================================================
    CHANGELOG (v3.3):
    - Atualização integral da grade de programação semanal (weeklySchedule) para refletir a grade enviada por Charlie Bravo.
    - Padronização de títulos ("Forró", "Top Classic", "Convés Brasil - Domingo/Semana", etc.).
    - Comentários explicativos e cabeçalho com metadados de versão/autor.
    - Melhoria no destaque 'AO VIVO' com base na hora local do browser.
    - CSS: pequenas melhorias de contraste e organização.
    ============================================================
    MANUAL DO USUÁRIO (Resumo Operacional):
    - Setas ← →: alternam rapidamente entre portos no painel de exibição (MarineTraffic/Windy).
    - Botões Windy/MarineTraffic: trocam a fonte do iframe principal.
    - Lista de portos à esquerda: clica para centralizar o mapa.
    - Painel direito (rádio): botão "OUÇA AGORA" liga/desliga o stream (BRLOGIC). O indicador 'AO VIVO' acende durante a reprodução.
    - Navegação da grade (Dom..Sáb): exibe a grade do dia escolhido e destaca automaticamente o programa atual do dia vigente.
    ============================================================
    GDD (Game/GUI Design Notes - foco em UX do painel):
    - Painel tripartido: navegação (esq.), exibição (centro), rádio/agenda (dir.).
    - A cor primária (#1f98a7) reforça identidade marítima (ciano/água).
    - Foco na operação: poucos cliques, elementos grandes, tipografia legível (Orbitron + Roboto Condensed).
    - Evoluções futuras (visão): camada de alerta por geofences AIS, overlays de vento/ondas combinados, e cards de playlists dinâmicas.
    ============================================================
  -->
  <style>
    :root {
      --primary-color: #1f98a7;
      --background-gradient: linear-gradient(160deg, #0f2027, #203a43, #2c5364);
      --text-light: #e0e0e0;
      --sidebar-bg: rgba(0,0,0,0.2);
      --sidebar-width: 250px;
    }
    * { box-sizing: border-box; }
    body {
      background-color: #0f1720;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Roboto Condensed', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color: var(--text-light);
      overflow: hidden;
    }
    .goc-container { width: 100%; height: 100%; display: flex; }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      padding: 15px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-right: 1px solid var(--primary-color);
    }
    .sidebar h2 {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      margin: 0 0 15px 0;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .view-switcher { display: flex; gap: 10px; margin-bottom: 20px; }
    .view-btn {
      flex-grow: 1;
      background: transparent;
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s;
      font-weight: 600;
    }
    .view-btn.active, .view-btn:hover { background-color: var(--primary-color); color: #0a1016; }
    .port-list { list-style: none; padding: 0; margin: 0; }
    .port-btn {
      display: block; width: 100%;
      background: transparent; border: 1px solid transparent;
      color: var(--text-light); padding: 10px 12px; border-radius: 6px;
      cursor: pointer; text-align: left; transition: all 0.25s; font-size: 0.98em;
    }
    .port-btn.active, .port-btn:hover { background-color: rgba(31, 152, 167, 0.18); border-color: var(--primary-color); }
    .main-content { flex-grow: 1; display: flex; overflow: hidden; min-width: 0; }
    .display-panel { flex-grow: 1; background-color: #000; position: relative; min-width: 0; }
    .display-panel iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .radio-operations-panel {
      width: 460px; flex-shrink: 0; display: flex; flex-direction: column;
      border-left: 1px solid var(--primary-color); background: var(--background-gradient);
    }
    .radio-panel { padding: 16px; background-color: rgba(0,0,0,0.35); border-bottom: 1px solid var(--primary-color); }
    .radio-branding h1 {
      font-family: 'Orbitron', sans-serif; font-size: 28px; color: #fff;
      margin: 0 0 10px 0; text-shadow: 0 0 10px rgba(31,152,167,0.55);
    }
    .radio-controls { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .live-indicator {
      display: flex; align-items: center; gap: 8px;
      background-color: #6c757d; color: #fff; padding: 6px 12px;
      border-radius: 6px; font-weight: 700; font-size: 14px; letter-spacing: 0.3px; transition: background-color 0.25s;
    }
    .live-indicator.playing { background-color: #c0392b; }
    .live-dot { width: 10px; height: 10px; background-color: #ff5252; border-radius: 50%; }
    .live-indicator.playing .live-dot { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
    }
    .cta-button {
      background-color: var(--primary-color); color: #0a1016; border: none;
      padding: 12px 18px; border-radius: 8px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s; text-decoration: none; min-width: 150px; text-align: center;
    }
    .cta-button:hover { background-color: #29c7d8; box-shadow: 0 0 15px rgba(41, 199, 216, 0.6); }
    .schedule-panel { padding: 14px; flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
    .schedule-nav { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 6px; flex-wrap: wrap; }
    .day-btn {
      background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);
      padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: all 0.25s; flex: 1 1 12%;
      font-weight: 700; letter-spacing: 0.3px;
    }
    .day-btn:hover, .day-btn.active { background-color: var(--primary-color); color: #0a1016; }
    .program-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; }
    .program-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid rgba(31, 152, 167, 0.25); }
    .program-time { font-family: 'Orbitron', sans-serif; font-size: 0.95em; color: #b2ecff; flex-basis: 140px; flex-shrink: 0; }
    .program-details h3 { margin: 0; font-size: 1.05em; color: #fff; font-weight: 700; }
    .program-item.on-air { background-color: rgba(41, 199, 216, 0.16); border-left: 4px solid #29c7d8; padding-left: 6px; font-weight: 800; }
    .version-badge { font-size: 12px; opacity: 0.85; margin-top: 6px; }
  </style>
</head>
<body>

        <button class="view-btn active" data-view="marinetraffic">MarineTraffic</button>

  <audio id="radio-stream" preload="none">
    <source src="https://servidor27.brlogic.com:7098/live" type="audio/mpeg" />
  </audio>

  <script>
    // ============================================================
    //  Script principal - GOC Dashboard v3.3
    //  Data/Hora: 19/10/2025 19:01
    //  Autor: Jossian Brito | Comentários por Bravo Zulu
    //  Notas: Este script controla (1) mapa embarcado (Windy/MarineTraffic),
    //         (2) lista de portos, (3) player da rádio, (4) grade/agenda.
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      // --- CONFIG: Portos e visualizações do painel central
      const ports = [
        { name: "Porto de Santos", x: -46.3280, y: -23.9608, z: 13 },
        { name: "Porto do Rio de Janeiro", x: -43.1600, y: -22.9000, z: 13 },
        { name: "Porto de Suape", x: -34.9540, y: -8.3920, z: 13 },
        { name: "Terminal Ponta da Madeira (MA)", x: -44.3650, y: -2.5350, z: 13 },
        { name: "Porto de Itajaí", x: -48.6600, y: -26.9000, z: 13 },
        { name: "Porto de Paranaguá", x: -48.5000, y: -25.5100, z: 13 },
        { name: "Porto de Rio Grande", x: -52.1000, y: -32.0300, z: 13 },
        { name: "Porto de Salvador", x: -38.5100, y: -12.9700, z: 13 },
        { name: "Porto do Pecém", x: -38.7700, y: -3.5400, z: 13 },
        { name: "Vila do Conde / Barcarena (PA)", x: -48.7400, y: -1.5150, z: 13 },
        { name: "Itaqui / Alumar (MA)", x: -44.3450, y: -2.5550, z: 13 },
        { name: "Porto de Mucuripe", x: -38.4830, y: -3.7160, z: 13 }
      ];
      const viewTemplates = {
        windy: 'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom={z}&lat={y}&lon={x}',
        marinetraffic: 'https://www.marinetraffic.com/en/ais/embed/zoom:{z}/centerx:{x}/centery:{y}/maptype:0/shownames:true/showmenu:false/showtrack:false'
      };
      let currentPortIndex = 0;
      let activeView = 'marinetraffic';
      const displayPanel = document.getElementById('display-panel');
      const portList = document.getElementById('port-list');
      const viewSwitcher = document.querySelector('.view-switcher');

      function updateDisplay(portIndex) {
        currentPortIndex = (portIndex + ports.length) % ports.length;
        const port = ports[currentPortIndex];
        const url = viewTemplates[activeView]
          .replace('{x}', port.x).replace('{y}', port.y).replace('{z}', port.z || 13);
        displayPanel.innerHTML = '';
        const frame = document.createElement('iframe');
        frame.loading = 'lazy';
        frame.referrerPolicy = 'no-referrer-when-downgrade';
        frame.allowFullscreen = true;
        frame.src = url;
        displayPanel.appendChild(frame);
        portList.querySelectorAll('button').forEach((b, k) => b.classList.toggle('active', k === currentPortIndex));
        localStorage.setItem('goc:lastPortIndex', String(currentPortIndex));
        localStorage.setItem('goc:lastView', activeView);
      }

      ports.forEach((port, index) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'port-btn';
        btn.textContent = port.name.replace('Porto de ','').replace('Porto do ','');
        btn.addEventListener('click', () => updateDisplay(index));
        li.appendChild(btn);
        portList.appendChild(li);
      });

      viewSwitcher.addEventListener('click', (e) => {
        if (e.target.classList.contains('view-btn')) {
          activeView = e.target.dataset.view;
          viewSwitcher.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          updateDisplay(currentPortIndex);
        }
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') updateDisplay(currentPortIndex - 1);
        if (e.key === 'ArrowRight') updateDisplay(currentPortIndex + 1);
      });

      // --- PLAYER DE RÁDIO
      const playPauseBtn = document.getElementById('play-pause-btn');
      const radioStream = document.getElementById('radio-stream');
      const liveIndicator = document.getElementById('live-indicator');

      playPauseBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (radioStream.paused) radioStream.play();
        else radioStream.pause();
      });
      radioStream.addEventListener('play', () => {
        playPauseBtn.textContent = 'Pausar';
        liveIndicator.classList.add('playing');
      });
      radioStream.addEventListener('pause', () => {
        playPauseBtn.textContent = 'OUÇA AGORA';
        liveIndicator.classList.remove('playing');
      });

      // --- GRADE SEMANAL ATUALIZADA (v3.3)
      // Observação: faixas [startHour, endHour) em hora cheia local do navegador.
      const weeklySchedule = {
        domingo: [
          { startHour: 0, endHour: 1, title: "Viajando na Emoção" },
          { startHour: 1, endHour: 3, title: "Top Classic" },
          { startHour: 3, endHour: 8, title: "Coração Sertanejo FDS" },
          { startHour: 8, endHour: 10, title: "Algazarra" },
          { startHour: 10, endHour: 11, title: "TugKids" },
          { startHour: 11, endHour: 14, title: "Flash Dance" },
          { startHour: 14, endHour: 16, title: "Flash Back Top Hits" },
          { startHour: 16, endHour: 18, title: "Convés Brasil - Domingo" },
          { startHour: 18, endHour: 19, title: "As Quentes do Rock (Nacional e Internacional)" },
          { startHour: 19, endHour: 20, title: "O Melhor do Soul" },
          { startHour: 20, endHour: 22, title: "Forró de Bordo" },
          { startHour: 22, endHour: 23, title: "Top Hits 90s" },
          { startHour: 23, endHour: 24, title: "Clube do Rei DOM" }
        ],
        segunda: [
          { startHour: 0, endHour: 2, title: "Love Night - Madrugada Romântica" },
          { startHour: 2, endHour: 6, title: "Âncora da Fé" },
          { startHour: 6, endHour: 12, title: "Acorda Marujo ! Adrenalina" },
          { startHour: 12, endHour: 16, title: "Show da Tarde" },
          { startHour: 16, endHour: 17, title: "A Vibe do Reggae" },
          { startHour: 17, endHour: 18, title: "Back in Time" },
          { startHour: 18, endHour: 19, title: "TUGLIFE RETRO" },
          { startHour: 19, endHour: 20, title: "Fita K7" },
          { startHour: 20, endHour: 21, title: "Top Hits 90s" },
          { startHour: 21, endHour: 22, title: "O Melhor do Soul" },
          { startHour: 22, endHour: 23, title: "Hits Eletrônicos" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ],
        terca: [
          { startHour: 0, endHour: 2, title: "Love Night - Segunda a Sexta" },
          { startHour: 2, endHour: 6, title: "Insônia" },
          { startHour: 6, endHour: 12, title: "Acorda Marujo ! Adrenalina" },
          { startHour: 12, endHour: 16, title: "Mix Gospel" },
          { startHour: 16, endHour: 17, title: "Forro de Bordo" },
          { startHour: 17, endHour: 19, title: "O Melhor do Soul" },
          { startHour: 19, endHour: 20, title: "Hora do Marinheiro" },
          { startHour: 20, endHour: 23, title: "Semeando a Palavra" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ],
        quarta: [
          { startHour: 0, endHour: 6, title: "Âncora da Fé" },
          { startHour: 6, endHour: 12, title: "Acorda Marujo ! Adrenalina" },
          { startHour: 12, endHour: 16, title: "Show da Tarde" },
          { startHour: 16, endHour: 17, title: "Galpão Farrapo" },
          { startHour: 17, endHour: 18, title: "Os Melhores Remixes" },
          { startHour: 18, endHour: 20, title: "O Melhor do Rock Nacional (Barão Vermelho, Kid Abelha)" },
          { startHour: 20, endHour: 22, title: "Convés Brasil _Semana" },
          { startHour: 22, endHour: 23, title: "Gospel Night" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ],
        quinta: [
          { startHour: 0, endHour: 6, title: "Âncora da Fé" },
          { startHour: 6, endHour: 12, title: "Convés Brasil _Semana" },
          { startHour: 12, endHour: 16, title: "Show da Tarde" },
          { startHour: 16, endHour: 17, title: "Axé e Pagode" },
          { startHour: 17, endHour: 19, title: "Top Hits 90s" },
          { startHour: 19, endHour: 20, title: "Clube do Brega - Especial" },
          { startHour: 20, endHour: 23, title: "Back in Time" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ],
        sexta: [
          { startHour: 0, endHour: 2, title: "Love Night - Segunda a Sexta" },
          { startHour: 2, endHour: 4, title: "Insônia" },
          { startHour: 4, endHour: 6, title: "Âncora da Fé" },
          { startHour: 6, endHour: 12, title: "Acorda Marujo ! Adrenalina" },
          { startHour: 12, endHour: 15, title: "Show da Tarde" },
          { startHour: 15, endHour: 19, title: "Top Hits 80s" },
          { startHour: 19, endHour: 20, title: "Hora do Marinheiro" },
          { startHour: 20, endHour: 21, title: "Os Melhores Remixes" },
          { startHour: 21, endHour: 23, title: "Back in Time" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ],
        sabado: [
          { startHour: 0, endHour: 4, title: "Top Classic" },
          { startHour: 4, endHour: 8, title: "Mais Brasil Fins de Semana" },
          { startHour: 8, endHour: 9, title: "Flash Back Top Hits" },
          { startHour: 9, endHour: 10, title: "Bora Viajar" },
          { startHour: 10, endHour: 12, title: "Melhores do Samba e Pagode 90 (Populares)" },
          { startHour: 12, endHour: 14, title: "Forro de Bordo" },
          { startHour: 14, endHour: 15, title: "Nação Gaúcha" },
          { startHour: 15, endHour: 16, title: "TUGLIFE GYM" },
          { startHour: 16, endHour: 18, title: "Flash Dance" },
          { startHour: 18, endHour: 19, title: "O Melhor do Soul" },
          { startHour: 19, endHour: 21, title: "Vibe Total" },
          { startHour: 21, endHour: 23, title: "Clube do Brega - Especial" },
          { startHour: 23, endHour: 24, title: "A Hora do Rei (Roberto Carlos) SEG SAB" }
        ]
      };

      const dayNames = ["domingo", "segunda", "terca", "quarta", "quinta", "sexta", "sabado"];
      const dayLabels = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

      const programListElement = document.getElementById('program-list');
      const scheduleNavElement = document.getElementById('schedule-nav');

      // Sincroniza com o dia local do navegador (sugestão: manter máquinas do estúdio com fuso America/Fortaleza)
      const now = new Date();
      const todayIndex = now.getDay();
      let selectedDayIndex = todayIndex;

      function renderSchedule(dayIndex) {
        programListElement.innerHTML = '';
        const dayKey = dayNames[dayIndex];
        const schedule = weeklySchedule[dayKey];
        schedule.forEach(program => {
          const li = document.createElement('li');
          li.classList.add('program-item');
          li.id = `${dayKey}-program-${program.startHour}`;
          const endTime = (program.endHour === 24) ? '00:00' : String(program.endHour).padStart(2, '0') + ':00';
          li.innerHTML = `
            <div class="program-time">${String(program.startHour).padStart(2,'0')}:00 - ${endTime}</div>
            <div class="program-details"><h3>${program.title}</h3></div>`;
          programListElement.appendChild(li);
        });
        highlightCurrentProgram();
      }

      function highlightCurrentProgram() {
        document.querySelectorAll('.program-item').forEach(item => item.classList.remove('on-air'));
        if (selectedDayIndex === todayIndex) {
          const currentHour = new Date().getHours();
          const dayKey = dayNames[todayIndex];
          const currentProgram = weeklySchedule[dayKey].find(p => currentHour >= p.startHour && currentHour < p.endHour);
          if (currentProgram) {
            const el = document.getElementById(`${dayKey}-program-${currentProgram.startHour}`);
            if (el) el.classList.add('on-air');
          }
        }
      }

      dayLabels.forEach((label, index) => {
        const btn = document.createElement('button');
        btn.className = 'day-btn';
        btn.textContent = label;
        btn.dataset.dayIndex = index;
        if (index === todayIndex) btn.classList.add('active');
        scheduleNavElement.appendChild(btn);
        btn.addEventListener('click', () => {
          selectedDayIndex = index;
          document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderSchedule(index);
        });
      });

      renderSchedule(todayIndex);
      setInterval(highlightCurrentProgram, 60000);

      // --- BOOT
      function bootGoc() {
        const lastView = localStorage.getItem('goc:lastView') || 'marinetraffic';
        const lastPortIndex = Number(localStorage.getItem('goc:lastPortIndex')) || 0;
        activeView = lastView;
        currentPortIndex = Number.isFinite(lastPortIndex) ? lastPortIndex : 0;
        document.querySelectorAll('.view-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === activeView));
        updateDisplay(currentPortIndex);
      }
      bootGoc();
    });
  </script>
